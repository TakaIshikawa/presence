# Presence - Personal Branding Automation
# Copy to config.local.yaml and fill in credentials

github:
  username: "TakaIshikawa"
  token: "${GITHUB_TOKEN}"  # or paste directly in config.local.yaml
  repositories: []  # optional: ["owner/repo"]; empty means all owned repos
  include_issues: true
  include_discussions: false
  include_pull_requests: false

x:
  api_key: "${X_API_KEY}"
  api_secret: "${X_API_SECRET}"
  access_token: "${X_ACCESS_TOKEN}"
  access_token_secret: "${X_ACCESS_TOKEN_SECRET}"

anthropic:
  api_key: "${ANTHROPIC_API_KEY}"

paths:
  claude_logs: "~/.claude"
  allowed_projects:
    - "/Users/taka/Project/experiments/presence"
  static_site: "/Users/taka/Project/experiments/me"
  database: "./presence.db"

privacy:
  # Additional regex rules applied after built-in secret, email, and local path
  # redaction. Each rule supports name, pattern, placeholder or replacement,
  # and optional flags such as IGNORECASE, MULTILINE, or DOTALL.
  redaction_patterns: []
  replace_default_redaction_patterns: false

synthesis:
  model: "claude-sonnet-4-6"
  eval_model: "claude-opus-4-7"
  eval_threshold: 0.7  # minimum score to auto-post
  num_candidates: 3
  max_estimated_cost_per_run: null  # optional USD cap; null disables publish budget gate
  max_daily_estimated_cost: null     # optional USD cap; null disables daily publish budget gate
  feedback_lookback_days: 30  # recent reject/revise feedback to turn into prompt constraints
  feedback_max_items: 6       # max feedback-derived constraints included in generation prompts
  claim_check_enabled: true

polling:
  interval_minutes: 10
  daily_digest_hour: 23
  weekly_digest_day: "sunday"
  readiness_token_threshold: 500  # min accumulated tokens before triggering pipeline
  max_post_gap_hours: 12  # force pipeline after this many hours without posting
  max_daily_posts: 3  # cap x_posts per day to prioritize quality over volume

# Newsletter distribution
newsletter:
  enabled: true
  provider: "buttondown"
  api_key: "${BUTTONDOWN_API_KEY}"
  send_day: "monday"
  send_hour: 9  # UTC
  utm_source: "newsletter"
  utm_medium: "email"
  utm_campaign_template: "weekly-{week_end_compact}"

blog:
  manifest_path: "drafts/manifest.json"

# Historical theme injection
historical:
  enabled: true
  lookback_days: 180          # How far back to search for historical commits
  injection_frequency: 3      # Every Nth post includes historical context
  min_age_days: 30            # Commits must be at least this old
  max_historical_commits: 5   # Max historical commits to inject

# Cultivate integration (relationship-aware engagement)
cultivate:
  enabled: true
  db_path: "~/.cultivate/cultivate.db"
  forward_mentions: true           # Write mentions to cultivate events table
  enrich_replies: true             # Look up person context for reply drafting
  proactive_review: true           # Enable review_proactive.py
  reply_quality_threshold: 6.0     # Flag threshold for quality evaluation (0-10)

# Reply-to-reply engagement
replies:
  enabled: true
  max_daily_replies: 10  # cap auto-drafted replies per day
  draft_ttl_hours: 48    # dismiss pending reply drafts after this many hours
  dedup_lookback_hours: 72        # skip near-identical reply drafts to same author/target within this window
  dedup_similarity_threshold: 0.90 # normalized text similarity needed to suppress a draft
  classifier_fallback_enabled: false  # use Anthropic only when heuristics are uncertain
  spam_action: dismissed              # dismissed | low_priority | pending
  low_value_action: low_priority      # dismissed | low_priority | pending

# Embeddings for semantic search
embeddings:
  provider: "voyage"  # or "openai"
  model: "voyage-3-lite"
  api_key: "${VOYAGE_API_KEY}"

# Curated external sources (manually approved)
curated_sources:
  restricted_prompt_behavior: "strict"  # strict excludes restricted sources from prompts; permissive allows them
  max_x_accounts_per_run: 25
  x_tweets_per_account: 5
  rss_entries_per_source: 5
  feed_autodiscovery_enabled: true
  feed_autodiscovery_timeout_seconds: 20.0
  source_failure_threshold: 3
  source_cooldown_hours: 24
  freshness_half_life_days: 30.0  # Down-rank older prompt snippets without excluding them
  knowledge_context:
    max_per_author: 2       # cap prompt snippets from the same author
    max_per_source_type: 3  # cap prompt snippets from the same source type
  x_accounts:
    # AI/ML builders and researchers
    - username: "karpathy"
      name: "Andrej Karpathy"
      license: "attribution_required"
    - username: "swyx"
      name: "swyx"
      license: "attribution_required"
    - username: "simonw"
      name: "Simon Willison"
      license: "attribution_required"

  blogs:
    - domain: "simonwillison.net"
      name: "Simon Willison's Blog"
      feed_url: "https://simonwillison.net/atom/everything/"
      license: "attribution_required"

# Posting schedule optimization
scheduling:
  enabled: false         # Enable time-based posting optimization
  min_samples: 20        # Minimum posts needed before optimizing schedule

# Publish queue retry behavior
publish_queue:
  max_retry_delay_minutes: 360  # Cap exponential backoff at 6 hours

# Optional publishing embargo windows. Times and dates are interpreted in each
# window's local timezone.
publishing:
  embargo_windows: []
  daily_platform_limits: {}
  alt_text_guard_mode: "strict"  # strict blocks visual publish previews; warning only warns
  persona_guard_publish_mode: "warning"  # strict holds failed persona checks; warning only warns; disabled skips
  # Examples:
  # - timezone: "Asia/Tokyo"
  #   start: "22:00"
  #   end: "07:00"
  # - timezone: "America/Los_Angeles"
  #   date: "2026-12-25"

# Optional polling is skipped when stored remaining API budget is this low.
# Publish/reply posting paths are not guarded by these thresholds.
rate_limits:
  x_min_remaining: 10
  bluesky_min_remaining: 10
  anthropic_min_remaining: 5

# Operational health warning thresholds
operations_health:
  max_poll_age_minutes: 30
  max_reply_state_age_hours: 6
  max_platform_reply_state_age_hours: 6
  max_failed_queue_items: 0
  pipeline_window_hours: 24
  min_pipeline_runs_for_rejection_rate: 3
  max_pipeline_rejection_rate: 0.5
  max_engagement_fetch_age_hours: 36
  max_newsletter_weekly_unsubscribes: 5
  max_newsletter_churn_rate: 0.05

# Operational state alerts written into .tact/config/operations.yaml
operations:
  alerts:
    max_consecutive_publish_failures: 3
    max_ingestion_age_minutes: 60
    max_queue_backlog_items: 10
    evaluation_window_hours: 24
    min_evaluation_runs: 3
    min_evaluation_pass_rate: 0.5
    webhook_enabled: false
    webhook_url: ""
    webhook_min_level: "alert"

# Image generation for visual posts
image_gen:
  provider: "pillow"
  output_dir: "./generated_images"

# Proactive engagement (reply to others' tweets for reach)
proactive:
  enabled: true
  max_daily_replies: 5          # Cap proactive replies per day
  draft_ttl_hours: 48           # dismiss pending proactive drafts after this many hours
  dedup_lookback_hours: 72      # skip near-identical drafts to same author/target within this window
  dedup_similarity_threshold: 0.90
  account_cooldown_hours: 72    # Skip/deny proactive actions to accounts contacted recently
  min_relevance: 0.50           # Minimum semantic relevance to our knowledge base
  max_tweet_age_hours: 24       # Only reply to tweets newer than this
  reply_cap_per_account: 2      # Max replies per account per week
  max_accounts_per_run: 25      # Rotate through at most this many curated accounts per run
  tweets_per_account: 5         # Recent tweets to inspect per account
  search_enabled: false         # Enable X search (costs API credits)
  search_keywords: []           # Keywords to search for (when search_enabled)
  account_discovery_enabled: true   # Auto-discover candidate accounts
  max_candidates_per_run: 5         # Max accounts to evaluate per discovery run
  min_discovery_relevance: 0.45     # Min avg relevance to surface as candidate
  min_discovery_samples: 3          # Min relevant tweets to surface as candidate
