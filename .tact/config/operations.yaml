- id: run-poll
  name: Run Poll Pipeline
  description: Manually run the commit polling pipeline. Checks for new commits since
    last poll, finds related Claude Code prompts, generates and evaluates X posts,
    and publishes if score meets threshold.
  command: ./scripts/manage.sh run poll
  category: pipeline
  inputs: []
  schedule: every 90 minutes (5400 sec)
  dangerous: false
  estimatedDurationSec: 60
  tags:
  - content
  - social
  - x
  - pipeline
  runtimeType: oneshot
  healthCheck:
    command: ./scripts/check_poll_health.sh
    intervalSec: 300
    timeoutSec: 10
    successPattern: last_poll_time=
- id: run-daily
  name: Run Daily Digest
  description: Manually run the daily digest pipeline. Generates an X thread summarizing
    the day's commits and Claude Code activity, evaluates quality, and posts if it
    passes threshold.
  command: ./scripts/manage.sh run daily
  category: pipeline
  inputs: []
  schedule: daily at 23:59
  dangerous: false
  estimatedDurationSec: 90
  tags:
  - content
  - social
  - x
  - digest
  - pipeline
  runtimeType: oneshot
- id: run-weekly
  name: Run Weekly Blog Post
  description: Manually run the weekly blog post pipeline. Generates a blog post from
    the past 7 days of activity, evaluates quality, writes to static site, and commits/pushes
    to git if it passes threshold.
  command: ./scripts/manage.sh run weekly
  category: pipeline
  inputs: []
  schedule: weekly on Sundays at 12:00
  dangerous: false
  estimatedDurationSec: 120
  tags:
  - content
  - blog
  - pipeline
  runtimeType: oneshot
- id: retry
  name: Retry Unpublished Posts
  description: Retry posting unpublished X posts that passed evaluation but failed
    to publish (e.g., due to rate limiting). Respects 30-second delays between posts
    and abandons after 3 failed attempts.
  command: ./scripts/manage.sh retry
  category: utility
  inputs: []
  dangerous: false
  estimatedDurationSec: 60
  tags:
  - content
  - social
  - x
  - retry
  runtimeType: oneshot
- id: knowledge-build
  name: Build Knowledge Base
  description: 'Build semantic knowledge base from your own content: extracts insights
