operations:
- id: start
  name: Start Automation
  description: Load and start all scheduled automation jobs (poll, daily, weekly)
    via launchd. The command itself exits after loading the agents, but the scheduled
    jobs will run in the background.
  command: ./scripts/manage.sh start
  category: daemon
  inputs: []
  dangerous: false
  tags:
  - automation
  - daemon
  - scheduling
  runtimeType: oneshot
  healthCheck:
    command: launchctl list | grep -E 'com.presence.(poll|daily|weekly)'
    intervalSec: 30
    timeoutSec: 10
    successPattern: com\.presence\.(poll|daily|weekly)
- id: stop
  name: Stop Automation
  description: Unload and stop all scheduled automation jobs via launchd.
  command: ./scripts/manage.sh stop
  category: daemon
  inputs: []
  dangerous: false
  tags:
  - automation
  - daemon
  - scheduling
  runtimeType: oneshot
- id: restart
  name: Restart Automation
  description: Stop then start all scheduled automation jobs. First unloads then reloads
    all launchd agents.
  command: ./scripts/manage.sh restart
  category: daemon
  inputs: []
  dangerous: false
  tags:
  - automation
  - daemon
  - scheduling
  runtimeType: oneshot
  healthCheck:
    command: launchctl list | grep -E 'com.presence.(poll|daily|weekly)'
    intervalSec: 30
    timeoutSec: 10
    successPattern: com\.presence\.(poll|daily|weekly)
